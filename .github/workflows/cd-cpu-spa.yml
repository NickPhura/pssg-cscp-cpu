# ======================================================================================
#  Last Updated: 2025-07-14
#
#  Description:
#  This is the main CD workflow for the CPU Application.
#  It orchestrates the build and deployment process for the API and UI services.
#
#  Triggers:
#  1. Manual (`workflow_dispatch`): Allows for manual deployments to the 'development'
#     branch. Requires a 7-character commit SHA and manual approval.
#  2. Automatic (`push`): Triggers automatically on merge commits to the 'development'
#     branch for paths under 'cpu-app/'.
#
# ======================================================================================

name: CD CPU SPA

# --- TRIGGERS -----------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      short_merge_commit_sha:
        description: "Short (7 char) merge commit SHA"
        required: true
      branch:
        description: "Branch to deploy"
        required: true
        default: development

  push:
    branches:
      - development
    paths:
      - "cpu-app/**"

# --- JOBS ---------------------------------------------------------------------------
jobs:
  # ------------------------------------------------------------------------------------
  #  Purpose: determine the correct 7-character commit SHA
  #           to be used for the build. It handles both manual and push triggers.
  #  Outputs:
  #    - short_sha: The validated 7-character commit SHA.
  # ------------------------------------------------------------------------------------
  prepare-build-params:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.determine-sha-from-push.outputs.short_sha || steps.validate-manual-sha.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Required to inspect commit history

      - name: Validate Manual Trigger Branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${GITHUB_REF_NAME}" != "development" ]]; then
            echo "Error: Manual deployment can only be run on the 'development' branch."
            exit 1
          fi

      - name: Extract Merge Commit from Push Event
        id: determine-sha-from-push
        if: github.event_name == 'push'
        run: |
          # This command finds the first commit with 2 parents.
          MERGE_SHA=$(jq -r '.commits[] | select(.parents | length > 1) | .id' "$GITHUB_EVENT_PATH" | head -n 1)

          # Fail if no merge commit was found.
          if [[ -z "$MERGE_SHA" ]]; then
            echo "::error::No merge commit found in this push. This workflow only runs on merge commits to 'development'."
            exit 1
          fi

          echo "Found merge commit: $MERGE_SHA"
          echo "short_sha=$(echo $MERGE_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Validate Manual Trigger SHA
        id: validate-manual-sha
        if: github.event_name == 'workflow_dispatch'
        run: |
          SHORT_SHA="${{ github.event.inputs.short_merge_commit_sha }}"
          if [[ ! "$SHORT_SHA" =~ ^[a-fA-F0-9]{7}$ ]]; then
            echo "::error::SHA must be exactly 7 hexadecimal characters. Received: '$SHORT_SHA'"
            exit 1
          fi
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

  # ------------------------------------------------------------------------------------
  #  Job: build-and-deploy
  #  Purpose: Calls the reusable build workflow to build, publish, and scan the image.
  # ------------------------------------------------------------------------------------
  build-and-deploy:
    needs: prepare-build-params
    permissions:
      contents: read
      packages: write
      id-token: write # Required for environment protection
      security-events: write
    uses: ./.github/workflows/build-template.yml
    with:
      EVENT_NAME: ${{ github.event_name }}
      IMAGE_CONTEXT: ./
      IMAGE_FILE: ./cpu-app/Dockerfile
      IMAGE_NAME: cpu-spa
      REGISTRY: ${{ vars.DOCKER_REGISTRY }}
      BRANCH: ${{ github.ref_name }}
      # Use the output from pr job
      COMMIT_SHA: ${{ needs.prepare-build-params.outputs.short_sha }}
    secrets:
      REGISTRY_USER: ${{ secrets.DOCKER_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}