# ======================================================================================
#  Last Updated: 2025-07-14
#
#  Description:
#  This workflow runs a suite of security and quality checks on the Application,
#  which includes both a .NET API and an Angular UI.
#  It is triggered by pull requests to the 'development' branch, manual dispatches,
#  and on a fixed schedule.
#
#  Jobs:
#  1. build_and_scan:   Builds the full-stack app and runs CodeQL static analysis
#                       for both C# and JavaScript/TypeScript.
#  2. trivy_scan:       Scans the filesystem and Docker image for vulnerabilities,
#                       secrets, and misconfigurations using Trivy.
#
# act -W .github/workflows/ci-cpu-spa.yml --dryrun
# ======================================================================================
name: CI CPU SPA

# --- TRIGGERS -----------------------------------------------------------------------

# Added 'push' trigger due to CodeQL/code scanning 'MissingPushHook' error.
# This is required for security/code scanning results to show in the Security tab.
on:
  push:
    branches:
      - development
    paths:
      - "cpu-app/**"

  workflow_dispatch:

  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - development
    paths:
      - "cpu-app/**"

  schedule:
    - cron: "0 3 1,15 * *"

# --- JOBS ---------------------------------------------------------------------------
jobs:
  # ------------------------------------------------------------------------------------
  #  Job: build_and_scan
  #  Purpose: Builds the app, runs CodeQL static analysis (C# + JS/TS) and SonarCloud scan
  # ------------------------------------------------------------------------------------
  build_and_scan:
    name: Build, CodeQL and SonarCloud Scan
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Initialize CodeQL (JS/TS + C#)
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript,csharp

      # ---- Build Angular UI ----
      - name: Install Angular Dependencies
        working-directory: cpu-app/ClientApp
        run: npm ci

      - name: Build Angular Application
        working-directory: cpu-app/ClientApp
        run: npm run build -- --configuration production

      # ---- Build .NET API ----
      - name: Restore .NET Dependencies
        run: dotnet restore cpu-app/cpu-app.csproj

      - name: Build .NET Application
        run: dotnet build cpu-app/cpu-app.csproj --no-restore --configuration Release

      - name: Perform CodeQL Analysis (C#)
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

      - name: Perform CodeQL Analysis (JS/TS)
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=bcgov_pssg-cscp-cpu
            -Dsonar.organization=bcgov-sonarcloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ------------------------------------------------------------------------------------
  #  Job: trivy_scan
  #  Purpose: Use Trivy to scan both the source and built image for vulnerabilities.
  # ------------------------------------------------------------------------------------
  trivy_scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 1: Print a summary of LIBRARY VULNERABILITIES
      - name: Run Trivy and Print Library Vulnerabilities
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: "fs"
          scan-ref: "cpu-app"
          scanners: "vuln"
          vuln-type: "library"
          format: "table"
          exit-code: "0" # Don't fail the build, just report

      # STEP 2: Print a summary of SECRETS and MISCONFIGURATIONS
      - name: Run Trivy and Print Secrets and Misconfigurations
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: "fs"
          scan-ref: "cpu-app"
          scanners: "secret,misconfig"
          format: "table"
          exit-code: "0" # Don't fail the build, just report

      # STEP 3: Run the main scan for the official report and to enforce the security gate
      # NOTE: Misconfiguration (config SCA) filtering by severity is NOT supported in the Trivy GitHub Action as of July 2025.
      #       To avoid noisy CI failures caused by low/medium misconfigurations, only vulnerabilities and secrets are enforced here.
      - name: Run Trivy for SARIF Report and Security Gate
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: "fs"
          scan-ref: "cpu-app"
          scanners: "vuln,secret"
          vuln-type: "library"
          severity: "CRITICAL,HIGH" # only applies to vuln scanner
          exit-code: "1" # Will fail CI if CRITICAL or HIGH vulns or secrets are found
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results-cpu-spa.sarif"
          limit-severities-for-sarif: true # non severity sometimes fails the the job, so ignoring them intentionally.

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results-cpu-spa.sarif"
          category: "trivy-scan"
