name: Trivy Scanner

on:
  schedule:
    - cron: '0 14 */14 * *'  # 14:00 UTC = 6:00 AM PST, 7:00 AM PDT
  push:
    branches: ["**"]
  pull_request:
    branches: [development]

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy Filesystem and Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | bash
          echo "$(pwd)/bin" >> $GITHUB_PATH


      - name: Trivy FS scan - frontend (Angular)
        continue-on-error: true
        run: |
          trivy fs cpu-app/ClientApp \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --timeout 10m \
            --format sarif \
            --output trivy-frontend.sarif    


      - name: Trivy FS scan - backend (.NET Web API)
        continue-on-error: true
        run: |
          trivy fs cpu-app/ \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --timeout 10m \
            --format sarif \
            --output trivy-backend.sarif

      - name: Trivy config scan - frontend & Backend Dockerfile
        continue-on-error: true
        run: |
          trivy config cpu-app/Dockerfile \
            --severity MEDIUM,HIGH,CRITICAL \
            --exit-code 1 \
            --format table


      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
