name: ZAP coast cpu dev Scan

on:
  workflow_dispatch:

jobs:
  zap-coast-cpu-dev-full-scan:
    name: ZAP coast cpu dev Full Scan
    runs-on: [self-hosted, linux]
    timeout-minutes: 45

    env:
      ZAP_API: http://zaproxy:8080
      ZAP_API_KEY: ${{ secrets.ZAP_API_KEY }}
      ZAP_TARGET: https://coast-cpu-dev.silver.devops.bcgov
      KEYCLOAK_TOKEN_URL: ${{ secrets.KEYCLOAK_TOKEN_URL }}
      KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}

    steps:
      - name: Wait for ZAP to be ready
        run: |
          set -e
          for i in {1..30}; do
            if curl -sk "${ZAP_API}/JSON/core/view/version/?apikey=${ZAP_API_KEY}" | grep version; then
              echo "ZAP is ready!"
              exit 0
            fi
            echo "Waiting for ZAP..."
            sleep 10
          done
          echo "ZAP did not become ready in time"
          exit 1

      - name: Get Keycloak Token
        id: get_token
        run: |
          TOKEN_RESPONSE=$(curl -sk \
            --request POST \
            --data "grant_type=client_credentials" \
            --data "client_id=${KEYCLOAK_CLIENT_ID}" \
            --data "client_secret=${KEYCLOAK_CLIENT_SECRET}" \
            "${KEYCLOAK_TOKEN_URL}")
          export TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to get Keycloak token: $TOKEN_RESPONSE"
            exit 1
          fi
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Prime ZAP site tree with all important UI and API paths
        env:
          PROXY: http://zaproxy:8080
        run: |
          # UI paths (from Angular routes)
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/test&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/login&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/dashboard&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/budget_proposal/1001&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/expense_report/2002&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/program_application/3003&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/cap_program_application/4004&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/program_surplus/5005&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/surplus_report/6006&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/status_report/7007&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/completed_status_report/8008&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/upload_document/9009&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/upload_document&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/sign_contract/10010&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/sign_mod_agreement/10011&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/cover_letter/10112&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/profile/10113&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/profile&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/message_read&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/message_write&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/personnel&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/new_user&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/new_user_new_organization&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/authenticated/program/20011/30021&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/404&followRedirects=true"
          curl -sk "${ZAP_API}/JSON/core/action/accessUrl/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}/some-random-not-found-path&followRedirects=true"

          # API paths
          TOKEN="$TOKEN"
          # 1. Application Version
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/ApplicationVersionInfo"
          # 2. Authentication (token endpoint, no auth)
          curl -x $PROXY -sk -H "Content-Type: application/json" -d '{"secret":"dummysecret"}' "${ZAP_TARGET}/api/Authentication/token"
          # 3. Configuration
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/Configuration"
          # 4. Contract
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/Contract/Clone"
          # 5. DynamicsBlob
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsBlob/123456/654321"
          # 6. DynamicsBudgetProposal
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsBudgetProposal/123456/654321/98765"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsBudgetProposal"
          # 7. DynamicsCAPApplication
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsCAPApplication/123456/654321/88888"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsCAPApplication"
          # 8. DynamicsExpenseReport
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsExpenseReport/123456/654321/77777"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsExpenseReport"
          # 9. DynamicsFileController
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsFile/123456/654321/documents/contract/98765"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsFile/123456/654321/documents/account/54321"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsFile/123456/654321/document/22222"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsFile/contract_package/123456/654321/33333"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsFile/signed_contract/33333"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsFile/account/54321"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsFile/contract/98765"
          # 10. DynamicsOrg
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsOrg"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsOrg/SetStaff"
          # 11. DynamicsProgramApplicationController
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsProgramApplication/123456/654321/44444"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsProgramApplication"
          # 12. DynamicsProgramSurplusController
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsProgramSurplus/123456/654321/55555"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsProgramSurplus"
          # 13. DynamicsRegisterNewUser
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsRegisterNewUser"
          # 14. DynamicsStatusReport
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsStatusReport/123456/654321/7007"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsStatusReport/monthly_stats/123456/654321/98765"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsStatusReport/data_collection/123456/654321/8008"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}' "${ZAP_TARGET}/api/DynamicsStatusReport/7007"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/DynamicsStatusReport/export_monthly_report/98765/321/98765/ProgramA"
          # 15. Login & Logout
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/login"
          curl -x $PROXY -sk "${ZAP_TARGET}/login/token/123"
          curl -x $PROXY -sk "${ZAP_TARGET}/Logout"
          # 16. NotFoundController
          curl -x $PROXY -sk "${ZAP_TARGET}/404"
          # 17. ProgramController
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/Program/Approved/2024Q4"
          # 18. ScheduleGController
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/ScheduleG/CreateScheduleGTasks/2024Q4"
          # 19. UserController
          curl -x $PROXY -sk "${ZAP_TARGET}/api/User/isLoggedIn"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/User/current"
          curl -x $PROXY -sk -H "Authorization: Bearer $TOKEN" "${ZAP_TARGET}/api/User/GetLogoutUrl"

      - name: Start classic spider scan (broad crawl)
        run: |
          set -e
          SPIDER_ID=$(curl -sk "${ZAP_API}/JSON/spider/action/scan/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}" | jq -r .scan)
          echo "Spider scan started: $SPIDER_ID"
          if [ "$SPIDER_ID" = "null" ] || [ -z "$SPIDER_ID" ]; then
            echo "Spider scan failed to start (ID is null or empty)."
            exit 1
          fi
          for i in {1..90}; do
            STATUS=$(curl -sk "${ZAP_API}/JSON/spider/view/status/?apikey=${ZAP_API_KEY}&scanId=$SPIDER_ID" | jq -r .status)
            echo "Spider progress: $STATUS%"
            if [ "$STATUS" = "100" ]; then
              echo "Spider scan completed"
              break
            fi
            sleep 5
          done

      - name: Start AJAX spider scan (for JS-heavy/SPAs)
        run: |
          set -e
          AJAX_SCAN_ID=$(curl -sk "${ZAP_API}/JSON/ajaxSpider/action/scan/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}" | jq -r .scan)
          echo "AJAX spider scan started: $AJAX_SCAN_ID"
          for i in {1..60}; do
            STATUS=$(curl -sk "${ZAP_API}/JSON/ajaxSpider/view/status/?apikey=${ZAP_API_KEY}" | jq -r .status)
            echo "AJAX spider progress: $STATUS"
            if [ "$STATUS" = "stopped" ]; then
              echo "AJAX spider scan completed"
              break
            fi
            sleep 5
          done

      - name: Start active scan (full site)
        run: |
          set -e
          SCAN_ID=$(curl -sk "${ZAP_API}/JSON/ascan/action/scan/?apikey=${ZAP_API_KEY}&url=${ZAP_TARGET}" | jq -r .scan)
          echo "Active scan started: $SCAN_ID"
          if [ "$SCAN_ID" = "null" ] || [ -z "$SCAN_ID" ]; then
            echo "Active scan failed to start (ID is null or empty)."
            exit 1
          fi
          for i in {1..120}; do
            STATUS=$(curl -sk "${ZAP_API}/JSON/ascan/view/status/?apikey=${ZAP_API_KEY}&scanId=$SCAN_ID" | jq -r .status)
            echo "Active scan progress: $STATUS%"
            if [ "$STATUS" = "100" ]; then
              echo "Active scan completed"
              break
            fi
            sleep 10
          done

      - name: Download ZAP scan report
        run: |
          set -e
          curl -sk "${ZAP_API}/OTHER/core/other/jsonreport/?apikey=${ZAP_API_KEY}" -o zap_coast_cpu_dev_report.json
          if [ ! -s zap_coast_cpu_dev_report.json ]; then
            echo "Download failed or zap_coast_cpu_dev_report.json is empty!"
            exit 1
          fi
          ls -lh zap_coast_cpu_dev_report.json
          head zap_coast_cpu_dev_report.json

      - name: Upload ZAP full scan report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: zap-coast-cpu-dev-report
          path: zap_coast_cpu_dev_report.json