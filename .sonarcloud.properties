# SonarCloud configuration for BC Government CPU Application
sonar.projectKey=bcgov_pssg-cscp-cpu
sonar.organization=bcgov-sonarcloud

# Project metadata
sonar.projectName=Coast CPU
sonar.projectVersion=1.0

# Path to sources
# Backend: Database layer, business logic, API controllers
# Frontend: Angular SPA client application  
# Interfaces: External service integrations (BCeID, Dynamics, SharePoint)
sonar.sources=Database,Manager.Contract,Manager,Resources,Shared.Contract,Shared.Database,cpu-app,cpu-interfaces

# Exclude build artifacts and generated code
sonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/dist/**,**/ServiceReference1/**,**/Models/MicrosoftDynamicsCRM*.cs,**/*.Designer.cs,**/*Generated*.cs